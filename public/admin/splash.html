<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Refuge de la Tendresse - Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --black: #000000;
  --copper: #b87333;
  --copper-bright: #e89658;
  --copper-deep: #8b5a2b;
  --copper-shine: #ffb87c;
  --copper-glow: rgba(184, 115, 51, 0.5);
  --warm-white: #faf7f0;
  --light-grey: #c8c8c8;
}

body { font-family: 'Poppins', sans-serif; background: #000; overflow: hidden; }

#splash {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 70%);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow: hidden;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

/* Ambient auras */
.aura {
  position: absolute;
  width: 800px; height: 800px;
  background: radial-gradient(circle, var(--copper-glow) 0%, transparent 60%);
  border-radius: 50%;
  animation: rotate 30s linear infinite;
  opacity: 0.3;
  filter: blur(60px);
}
.aura-2 { width: 600px; height: 600px; animation: rotate 25s linear infinite reverse; opacity: 0.2; }
@keyframes rotate { to { transform: rotate(360deg); } }

/* Cloud/smoke container */
.cloud-stage {
  position: relative;
  width: 500px;
  height: 400px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Cloud puffs */
.cloud-puff {
  position: absolute;
  border-radius: 50%;
  background: radial-gradient(circle,
    rgba(255, 184, 124, 0.6) 0%,
    rgba(184, 115, 51, 0.4) 30%,
    rgba(139, 90, 43, 0.2) 60%,
    transparent 80%);
  filter: blur(15px);
  opacity: 0;
  animation: cloud-form 3.5s ease-out 0.8s forwards;
}
.cloud-puff-1 { width: 300px; height: 300px; }
.cloud-puff-2 { width: 250px; height: 250px; animation-delay: 1s; top: 20px; left: 30px; }
.cloud-puff-3 { width: 220px; height: 220px; animation-delay: 1.2s; top: 40px; right: 20px; }
.cloud-puff-4 { width: 180px; height: 180px; animation-delay: 1.4s; bottom: 30px; left: 60px; }
.cloud-puff-5 { width: 160px; height: 160px; animation-delay: 1.5s; bottom: 40px; right: 50px; }

@keyframes cloud-form {
  0% { opacity: 0; transform: scale(0.3); }
  30% { opacity: 0.8; transform: scale(1.1); }
  60% { opacity: 0.9; transform: scale(1); }
  85% { opacity: 0.4; transform: scale(1.2); }
  100% { opacity: 0; transform: scale(1.5); }
}

/* Sparkle particles from cloud */
.sparkle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--copper-shine);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--copper-bright), 0 0 20px var(--copper);
  opacity: 0;
  animation: sparkle-fly 2s ease-out forwards;
}
@keyframes sparkle-fly {
  0% { opacity: 0; transform: scale(0) translate(0, 0); }
  30% { opacity: 1; transform: scale(1.5) translate(var(--tx, 20px), var(--ty, -20px)); }
  100% { opacity: 0; transform: scale(0) translate(calc(var(--tx, 20px) * 2), calc(var(--ty, -20px) * 2)); }
}

/* Dog container - just fades in from within cloud */
.dog-container {
  position: relative;
  width: 320px;
  height: 320px;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  transform: scale(0.5);
  filter: blur(20px);
  animation: dog-materialize 1.5s cubic-bezier(0.4, 0, 0.2, 1) 2s forwards;
  z-index: 5;
}
@keyframes dog-materialize {
  0% { opacity: 0; transform: scale(0.5); filter: blur(20px); }
  50% { opacity: 0.7; transform: scale(1.05); filter: blur(5px); }
  100% { opacity: 1; transform: scale(1); filter: blur(0); }
}

/* Copper glow behind dog */
.dog-glow {
  position: absolute;
  inset: -40px;
  background: radial-gradient(circle, var(--copper-glow) 0%, transparent 60%);
  border-radius: 50%;
  filter: blur(35px);
  opacity: 0;
  animation: glow-in 1.5s ease-out 2.5s forwards;
  z-index: -1;
}
@keyframes glow-in { to { opacity: 1; } }

/* Head bark motion */
.dog-head { transform-origin: 30% 100%; }
.dog-container.woofing-1 .dog-head { animation: bark 0.5s ease-in-out; }
.dog-container.woofing-2 .dog-head { animation: bark 0.5s ease-in-out; }
@keyframes bark {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  40% { transform: rotate(-10deg) translateY(-8px); }
  70% { transform: rotate(-5deg) translateY(-4px); }
}

/* Tail wag when arrived */
.dog-tail { transform-origin: 85% 60%; }
.dog-container.arrived .dog-tail {
  animation: wag 0.4s ease-in-out infinite alternate;
}
@keyframes wag {
  from { transform: rotate(-15deg); }
  to { transform: rotate(15deg); }
}

/* Eye blink */
.dog-eye { transform-origin: center; }
.dog-container.arrived .dog-eye {
  animation: blink 4s ease-in-out infinite;
}
@keyframes blink {
  0%, 92%, 100% { transform: scaleY(1); }
  95% { transform: scaleY(0.1); }
}

/* Tongue wiggle */
.dog-tongue { transform-origin: top center; }
.dog-container.arrived .dog-tongue {
  animation: tongue-wiggle 1.2s ease-in-out infinite alternate;
}
@keyframes tongue-wiggle {
  from { transform: rotate(-3deg); }
  to { transform: rotate(3deg); }
}

/* Woof bubbles */
.woof-bubble {
  position: absolute;
  background: linear-gradient(135deg, var(--copper) 0%, var(--copper-bright) 100%);
  color: var(--black);
  padding: 10px 22px;
  border-radius: 25px 25px 25px 5px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 1.6rem;
  opacity: 0;
  transform: scale(0);
  box-shadow: 0 8px 30px var(--copper-glow), inset 0 1px 0 var(--copper-shine);
  border: 2px solid var(--copper-shine);
  white-space: nowrap;
  z-index: 20;
  letter-spacing: 1px;
}
.woof-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 15px;
  width: 0; height: 0;
  border-left: 10px solid var(--copper);
  border-right: 10px solid transparent;
  border-top: 10px solid var(--copper);
  border-bottom: 10px solid transparent;
}

.woof-1 {
  top: 30px;
  right: 20px;
  animation: woof-pop 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 3.5s forwards;
}
.woof-2 {
  top: 65px;
  right: 0;
  font-size: 1.3rem;
  animation: woof-pop 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 4.5s forwards;
}
@keyframes woof-pop {
  0% { opacity: 0; transform: scale(0) rotate(-15deg); }
  20% { opacity: 1; transform: scale(1.3) rotate(5deg); }
  35% { transform: scale(1) rotate(0deg); }
  80% { opacity: 1; transform: scale(1) rotate(0deg); }
  100% { opacity: 0; transform: scale(0.9) translateY(-20px); }
}

/* Brand */
.brand-container {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  opacity: 0;
  animation: brand-in 1.2s ease-out 5.5s forwards;
  z-index: 5;
}
@keyframes brand-in {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); letter-spacing: 15px; }
  to { opacity: 1; transform: translateX(-50%) translateY(0); letter-spacing: 4px; }
}

.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 400;
  color: var(--warm-white);
  letter-spacing: 4px;
  margin-bottom: 8px;
  text-transform: uppercase;
  white-space: nowrap;
}
.brand-name .accent {
  background: linear-gradient(135deg, var(--copper-deep) 0%, var(--copper) 25%, var(--copper-shine) 50%, var(--copper) 75%, var(--copper-deep) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 500;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer { to { background-position: 200% center; } }

.brand-subtitle {
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  font-weight: 300;
  color: var(--light-grey);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-top: 5px;
}

.divider-lines {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 15px;
  opacity: 0;
  animation: brand-in 0.8s ease-out 6s forwards;
}
.divider-lines::before, .divider-lines::after {
  content: '';
  width: 60px;
  height: 1px;
  align-self: center;
}
.divider-lines::before { background: linear-gradient(90deg, transparent, var(--copper-deep)); }
.divider-lines::after { background: linear-gradient(90deg, var(--copper-deep), transparent); }
.divider-lines-dot {
  width: 6px; height: 6px;
  background: var(--copper);
  border-radius: 50%;
  align-self: center;
  box-shadow: 0 0 10px var(--copper-glow);
}

.admin-tag {
  position: absolute;
  bottom: 13%;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: brand-in 1s ease-out 6.3s forwards;
}
.admin-tag span {
  font-family: 'Poppins', sans-serif;
  background: rgba(184, 115, 51, 0.08);
  border: 1px solid var(--copper-deep);
  color: var(--copper-bright);
  padding: 10px 28px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  backdrop-filter: blur(10px);
  white-space: nowrap;
}

.loading-container {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: brand-in 0.8s ease-out 6.5s forwards;
}
.loading-bar {
  width: 200px;
  height: 1px;
  background: rgba(184, 115, 51, 0.2);
  overflow: hidden;
  position: relative;
}
.loading-bar::after {
  content: '';
  position: absolute;
  top: 0; left: -50%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--copper-shine), transparent);
  animation: loading-slide 1.5s ease-in-out infinite;
}
@keyframes loading-slide { to { left: 100%; } }
.loading-text {
  text-align: center;
  font-family: 'Poppins', sans-serif;
  font-size: 0.65rem;
  color: var(--copper-deep);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 12px;
}

.skip-btn {
  position: absolute;
  bottom: 15px; right: 25px;
  background: none;
  border: 1px solid rgba(184, 115, 51, 0.3);
  color: rgba(184, 115, 51, 0.6);
  padding: 8px 20px;
  border-radius: 4px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  animation: brand-in 0.5s ease-out 7s forwards;
  z-index: 100;
}
.skip-btn:hover {
  color: var(--copper-shine);
  border-color: var(--copper);
  background: rgba(184, 115, 51, 0.1);
}

.corner {
  position: absolute;
  width: 60px; height: 60px;
  border: 1px solid var(--copper-deep);
  opacity: 0;
  animation: brand-in 1s ease-out 5.8s forwards;
}
.corner-tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
.corner-tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
.corner-bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
.corner-br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

@media(max-width: 768px) {
  .brand-name { font-size: 1.8rem; letter-spacing: 2px; }
  .brand-subtitle { font-size: 0.65rem; letter-spacing: 5px; }
  .dog-container { width: 240px; height: 240px; }
  .cloud-stage { width: 350px; height: 300px; }
  .corner { width: 40px; height: 40px; }
  .woof-bubble { font-size: 1.2rem; padding: 7px 16px; }
  .woof-2 { font-size: 1rem; }
}
</style>
</head>
<body>

<div id="splash">

  <div class="aura"></div>
  <div class="aura aura-2"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- CLOUD + DOG STAGE -->
  <div class="cloud-stage">
    <!-- Cloud puffs (background) -->
    <div class="cloud-puff cloud-puff-1"></div>
    <div class="cloud-puff cloud-puff-2"></div>
    <div class="cloud-puff cloud-puff-3"></div>
    <div class="cloud-puff cloud-puff-4"></div>
    <div class="cloud-puff cloud-puff-5"></div>

    <!-- Sparkles flying out from cloud -->
    <div class="sparkle" style="top:30%;left:20%;--tx:-40px;--ty:-30px;animation-delay:1.8s"></div>
    <div class="sparkle" style="top:20%;right:25%;--tx:30px;--ty:-40px;animation-delay:1.9s"></div>
    <div class="sparkle" style="bottom:30%;left:15%;--tx:-35px;--ty:20px;animation-delay:2s"></div>
    <div class="sparkle" style="bottom:25%;right:20%;--tx:40px;--ty:25px;animation-delay:2.1s"></div>
    <div class="sparkle" style="top:50%;left:10%;--tx:-45px;--ty:0;animation-delay:2.2s"></div>
    <div class="sparkle" style="top:50%;right:10%;--tx:45px;--ty:0;animation-delay:2.3s"></div>
    <div class="sparkle" style="top:15%;left:45%;--tx:5px;--ty:-40px;animation-delay:2.4s"></div>
    <div class="sparkle" style="bottom:15%;left:50%;--tx:-5px;--ty:35px;animation-delay:2.5s"></div>

    <!-- DOG (materializes from cloud) -->
    <div class="dog-container" id="dogContainer">
      <div class="dog-glow"></div>

      <!-- Metallic Beagle SVG - facing forward slightly right -->
      <svg width="320" height="280" viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="metallicCopper" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffb87c"/>
            <stop offset="20%" style="stop-color:#e89658"/>
            <stop offset="50%" style="stop-color:#b87333"/>
            <stop offset="80%" style="stop-color:#8b5a2b"/>
            <stop offset="100%" style="stop-color:#5a3a1c"/>
          </linearGradient>
          <linearGradient id="copperHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ffb87c;stop-opacity:0.8"/>
            <stop offset="50%" style="stop-color:#fff;stop-opacity:0.6"/>
            <stop offset="100%" style="stop-color:#ffb87c;stop-opacity:0.4"/>
          </linearGradient>
          <linearGradient id="copperShadow" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#8b5a2b"/>
            <stop offset="100%" style="stop-color:#4a2c15"/>
          </linearGradient>
          <linearGradient id="chromeWhite" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff"/>
            <stop offset="30%" style="stop-color:#f5f0e5"/>
            <stop offset="70%" style="stop-color:#e5dcc5"/>
            <stop offset="100%" style="stop-color:#c9bea0"/>
          </linearGradient>
          <linearGradient id="darkOutline" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#5a3a1c"/>
            <stop offset="100%" style="stop-color:#2a1808"/>
          </linearGradient>
          <radialGradient id="noseMetal" cx="30%" cy="30%">
            <stop offset="0%" style="stop-color:#8b5a2b"/>
            <stop offset="50%" style="stop-color:#4a2c15"/>
            <stop offset="100%" style="stop-color:#1a0a02"/>
          </radialGradient>
          <radialGradient id="shineSpot" cx="30%" cy="30%">
            <stop offset="0%" style="stop-color:#fff;stop-opacity:0.8"/>
            <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
          </radialGradient>
          <linearGradient id="tongueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ff8fab"/>
            <stop offset="100%" style="stop-color:#c9426e"/>
          </linearGradient>
        </defs>

        <!-- SHADOW -->
        <ellipse cx="160" cy="255" rx="90" ry="8" fill="#000" opacity="0.4"/>

        <!-- TAIL (bottom layer) -->
        <g class="dog-tail">
          <path d="M 60 155
                   Q 30 145 15 155
                   Q 5 165 15 175
                   Q 25 180 45 175
                   Q 60 170 75 168 Z"
                fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
          <!-- White tip -->
          <path d="M 15 155 Q 5 165 15 175 Q 20 172 22 168 Q 18 162 15 155 Z"
                fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
          <path d="M 30 155 Q 45 152 60 158" stroke="url(#copperHighlight)" stroke-width="2" fill="none" opacity="0.7"/>
        </g>

        <!-- BACK LEGS -->
        <path d="M 105 195 L 100 240 Q 100 250 115 250 Q 130 250 128 240 L 130 195 Z"
              fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
        <ellipse cx="115" cy="248" rx="18" ry="8" fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3"/>
        <path d="M 108 250 L 108 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
        <path d="M 115 251 L 115 247" stroke="url(#darkOutline)" stroke-width="1.5"/>
        <path d="M 122 250 L 122 246" stroke="url(#darkOutline)" stroke-width="1.5"/>

        <path d="M 190 195 L 185 240 Q 185 250 200 250 Q 215 250 213 240 L 215 195 Z"
              fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
        <ellipse cx="200" cy="248" rx="18" ry="8" fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3"/>
        <path d="M 193 250 L 193 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
        <path d="M 200 251 L 200 247" stroke="url(#darkOutline)" stroke-width="1.5"/>
        <path d="M 207 250 L 207 246" stroke="url(#darkOutline)" stroke-width="1.5"/>

        <!-- BODY -->
        <path d="M 75 155
                 Q 65 130 90 115
                 Q 130 105 180 108
                 Q 230 112 235 145
                 Q 240 180 220 200
                 Q 190 215 150 213
                 Q 100 210 75 190
                 Q 65 175 75 155 Z"
              fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="4" stroke-linejoin="round"/>

        <!-- WHITE BELLY -->
        <path d="M 100 175
                 Q 130 170 175 175
                 Q 210 178 215 195
                 Q 210 210 175 210
                 Q 130 213 105 205
                 Q 90 195 100 175 Z"
              fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3.5" stroke-linejoin="round"/>

        <!-- Body shine -->
        <ellipse cx="150" cy="130" rx="60" ry="12" fill="url(#copperHighlight)" opacity="0.6"/>
        <ellipse cx="130" cy="140" rx="30" ry="8" fill="url(#shineSpot)"/>

        <!-- FRONT LEGS -->
        <path d="M 125 190 L 122 240 Q 122 250 137 250 Q 152 250 150 240 L 150 190 Z"
              fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
        <ellipse cx="137" cy="248" rx="18" ry="8" fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3"/>
        <path d="M 130 250 L 130 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
        <path d="M 137 251 L 137 247" stroke="url(#darkOutline)" stroke-width="1.5"/>
        <path d="M 144 250 L 144 246" stroke="url(#darkOutline)" stroke-width="1.5"/>

        <path d="M 168 190 L 165 240 Q 165 250 180 250 Q 195 250 193 240 L 193 190 Z"
              fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
        <ellipse cx="180" cy="248" rx="18" ry="8" fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3"/>
        <path d="M 173 250 L 173 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
        <path d="M 180 251 L 180 247" stroke="url(#darkOutline)" stroke-width="1.5"/>
        <path d="M 187 250 L 187 246" stroke="url(#darkOutline)" stroke-width="1.5"/>

        <!-- LEFT EAR (behind) -->
        <path d="M 195 75
                 Q 175 65 172 85
                 Q 172 115 180 140
                 Q 190 150 200 145
                 Q 210 130 208 100
                 Q 208 80 195 75 Z"
              fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3.5" stroke-linejoin="round"/>
        <path d="M 190 90 Q 188 115 195 135" stroke="url(#copperShadow)" stroke-width="2" fill="none" opacity="0.6"/>

        <!-- HEAD -->
        <g class="dog-head">
          <path d="M 195 75
                   Q 245 70 265 90
                   Q 280 110 275 135
                   Q 268 155 245 158
                   Q 220 158 205 150
                   Q 190 130 190 105
                   Q 190 85 195 75 Z"
                fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="4" stroke-linejoin="round"/>

          <!-- White face patch -->
          <path d="M 240 90
                   Q 265 92 275 110
                   Q 278 130 265 148
                   Q 250 155 235 148
                   Q 225 130 232 108
                   Q 235 95 240 90 Z"
                fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>

          <!-- Head shine -->
          <ellipse cx="220" cy="95" rx="18" ry="6" fill="url(#copperHighlight)" opacity="0.7"/>

          <!-- SNOUT -->
          <path d="M 258 118
                   Q 285 118 290 130
                   Q 292 145 275 148
                   Q 265 148 258 140
                   Q 252 128 258 118 Z"
                fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>

          <!-- NOSE -->
          <ellipse cx="285" cy="128" rx="10" ry="8" fill="url(#noseMetal)" stroke="url(#darkOutline)" stroke-width="2"/>
          <ellipse cx="282" cy="125" rx="3" ry="2" fill="#fff" opacity="0.7"/>

          <!-- MOUTH -->
          <path d="M 270 140 Q 275 148 265 150" stroke="url(#darkOutline)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<script>
// Dog "arrives" state (enables tail wag, blink, tongue)
setTimeout(function() {
  var dog = document.getElementById('dogContainer');
  if (dog) dog.classList.add('arrived');
}, 3200);

// First woof
setTimeout(function() {
  var dog = document.getElementById('dogContainer');
  if (dog) dog.classList.add('woofing-1');
}, 3500);

// Second woof
setTimeout(function() {
  var dog = document.getElementById('dogContainer');
  if (dog) {
    dog.classList.remove('woofing-1');
    dog.classList.add('woofing-2');
  }
}, 4500);

function endSplash() {
  document.getElementById('splash').classList.add('hide');
  setTimeout(function() {
    if (window.parent && window.parent.splashComplete) {
      window.parent.splashComplete();
    } else {
      window.parent.postMessage('splashDone', '*');
    }
  }, 800);
}

setTimeout(function() { endSplash(); }, 8000);
</script>
