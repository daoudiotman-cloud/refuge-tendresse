<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Refuge de la Tendresse - Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --black: #000000;
  --charcoal: #141414;
  --copper: #b87333;
  --copper-bright: #e89658;
  --copper-deep: #8b5a2b;
  --copper-shine: #ffb87c;
  --copper-glow: rgba(184, 115, 51, 0.5);
  --warm-white: #faf7f0;
  --light-grey: #c8c8c8;
}

body { font-family: 'Poppins', sans-serif; background: #000; overflow: hidden; }

#splash {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 70%);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow: hidden;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

/* Rotating copper aura */
.aura {
  position: absolute;
  width: 800px; height: 800px;
  background: radial-gradient(circle, var(--copper-glow) 0%, transparent 60%);
  border-radius: 50%;
  animation: rotate 30s linear infinite;
  opacity: 0.35;
  filter: blur(60px);
}
.aura-2 { width: 600px; height: 600px; animation: rotate 25s linear infinite reverse; opacity: 0.25; }
@keyframes rotate { to { transform: rotate(360deg); } }

/* Embers */
.ember {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--copper-bright);
  border-radius: 50%;
  opacity: 0;
  box-shadow: 0 0 10px var(--copper-bright), 0 0 20px var(--copper);
  animation: float-up 8s ease-in-out infinite;
}
@keyframes float-up {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 0.8; }
  90% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-20vh) scale(1.5); }
}

/* Copper dot */
.copper-dot {
  width: 8px; height: 8px;
  background: radial-gradient(circle, var(--copper-shine) 0%, var(--copper) 40%, var(--copper-deep) 100%);
  border-radius: 50%;
  position: absolute;
  animation: dot-emerge 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  box-shadow: 0 0 40px var(--copper-glow), 0 0 80px var(--copper-glow);
}
@keyframes dot-emerge {
  0% { width: 8px; height: 8px; opacity: 1; }
  50% { width: 150px; height: 150px; opacity: 1; box-shadow: 0 0 100px var(--copper), 0 0 200px var(--copper-glow); }
  100% { width: 250px; height: 250px; opacity: 0; }
}

/* Dog container - runs in from right, facing LEFT */
.dog-runner {
  position: absolute;
  right: -400px;
  top: 45%;
  transform: translateY(-50%);
  width: 400px;
  height: 300px;
  animation: run-in 2.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.5s forwards;
  z-index: 10;
}
@keyframes run-in {
  0% { right: -400px; }
  75% { right: calc(50% - 150px); }
  85% { right: calc(50% - 180px); }
  100% { right: calc(50% - 160px); }
}

/* Copper trail behind running dog */
.copper-trail {
  position: absolute;
  right: 100%;
  top: 60%;
  width: 200px;
  height: 40px;
  opacity: 0;
  animation: trail-appear 2.5s ease-out 1.5s;
  pointer-events: none;
}
@keyframes trail-appear {
  0%, 100% { opacity: 0; }
  50% { opacity: 1; }
}
.trail-line {
  position: absolute;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--copper-bright), transparent);
  animation: trail-fade 0.8s ease-out infinite;
  opacity: 0;
}
.trail-1 { top: 10px; width: 100%; animation-delay: 0s; }
.trail-2 { top: 20px; width: 80%; animation-delay: 0.15s; }
.trail-3 { top: 30px; width: 90%; animation-delay: 0.3s; }
@keyframes trail-fade {
  0% { opacity: 0.8; transform: translateX(0); }
  100% { opacity: 0; transform: translateX(-30px); }
}

/* Bouncing while running */
.dog-body {
  animation: run-bounce 0.35s ease-in-out infinite;
  transform-origin: center center;
}
@keyframes run-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-15px); }
}

/* After arrived - settle */
.dog-runner.arrived .dog-body {
  animation: settle 0.6s ease-out forwards;
}
@keyframes settle {
  0% { transform: translateY(-8px); }
  40% { transform: translateY(3px); }
  100% { transform: translateY(0); }
}

/* Copper glow when arrived */
.dog-glow {
  position: absolute;
  inset: -30px;
  background: radial-gradient(circle, var(--copper-glow) 0%, transparent 60%);
  border-radius: 50%;
  filter: blur(35px);
  opacity: 0;
  z-index: -1;
}
.dog-runner.arrived .dog-glow { animation: glow-in 1s ease-out forwards; }
@keyframes glow-in { to { opacity: 1; } }

/* Head bark motion */
.dog-head { transform-origin: 70% 100%; }
.dog-runner.woofing-1 .dog-head { animation: bark 0.5s ease-in-out; }
.dog-runner.woofing-2 .dog-head { animation: bark 0.5s ease-in-out; }
@keyframes bark {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  40% { transform: rotate(-12deg) translateY(-6px); }
  70% { transform: rotate(-6deg) translateY(-3px); }
}

/* Tail wag when arrived */
.dog-tail { transform-origin: 20% 50%; }
.dog-runner.arrived .dog-tail {
  animation: wag 0.5s ease-in-out infinite alternate;
}
@keyframes wag {
  from { transform: rotate(-10deg); }
  to { transform: rotate(15deg); }
}

/* Ear flap */
.dog-ear { transform-origin: 50% 20%; }
.dog-runner .dog-ear {
  animation: ear-flap 0.35s ease-in-out infinite alternate;
}
.dog-runner.arrived .dog-ear {
  animation: ears-rest 0.5s ease-out forwards;
}
@keyframes ear-flap {
  from { transform: rotate(-5deg); }
  to { transform: rotate(8deg); }
}
@keyframes ears-rest {
  to { transform: rotate(0deg); }
}

/* Legs galloping */
.leg { transform-origin: top center; }
.leg-fl, .leg-br {
  animation: gallop-a 0.35s ease-in-out infinite;
}
.leg-fr, .leg-bl {
  animation: gallop-b 0.35s ease-in-out infinite;
}
@keyframes gallop-a {
  0%, 100% { transform: rotate(-25deg); }
  50% { transform: rotate(20deg); }
}
@keyframes gallop-b {
  0%, 100% { transform: rotate(20deg); }
  50% { transform: rotate(-25deg); }
}
.dog-runner.arrived .leg {
  animation: legs-rest 0.4s ease-out forwards;
}
@keyframes legs-rest {
  to { transform: rotate(0deg); }
}

/* Woof bubbles */
.woof-bubble {
  position: absolute;
  background: linear-gradient(135deg, var(--copper) 0%, var(--copper-bright) 100%);
  color: var(--black);
  padding: 10px 22px;
  border-radius: 25px 25px 5px 25px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 1.6rem;
  opacity: 0;
  transform: scale(0);
  box-shadow: 0 8px 30px var(--copper-glow), inset 0 1px 0 var(--copper-shine);
  border: 2px solid var(--copper-shine);
  white-space: nowrap;
  z-index: 20;
  letter-spacing: 1px;
}
.woof-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  right: 15px;
  width: 0; height: 0;
  border-right: 10px solid var(--copper);
  border-left: 10px solid transparent;
  border-top: 10px solid var(--copper);
  border-bottom: 10px solid transparent;
}

.woof-1 {
  top: 30px;
  left: 40px;
  animation: woof-pop 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 3.7s forwards;
}
.woof-2 {
  top: 70px;
  left: 60px;
  font-size: 1.3rem;
  animation: woof-pop 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 4.7s forwards;
}
@keyframes woof-pop {
  0% { opacity: 0; transform: scale(0) rotate(-15deg); }
  20% { opacity: 1; transform: scale(1.3) rotate(5deg); }
  35% { transform: scale(1) rotate(0deg); }
  80% { opacity: 1; transform: scale(1) rotate(0deg); }
  100% { opacity: 0; transform: scale(0.9) translateY(-20px); }
}

/* Ground line */
.ground-line {
  position: absolute;
  bottom: 32%;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--copper-deep), var(--copper), var(--copper-deep), transparent);
  animation: expand-ground 1s ease-out 1.5s forwards;
  opacity: 0.6;
  box-shadow: 0 0 10px var(--copper-glow);
}
@keyframes expand-ground {
  to { width: 500px; }
}

/* Brand text */
.brand-container {
  position: absolute;
  bottom: 18%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  opacity: 0;
  animation: brand-in 1.2s ease-out 5.8s forwards;
  z-index: 5;
}
@keyframes brand-in {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); letter-spacing: 15px; }
  to { opacity: 1; transform: translateX(-50%) translateY(0); letter-spacing: 4px; }
}

.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 400;
  color: var(--warm-white);
  letter-spacing: 4px;
  margin-bottom: 8px;
  text-transform: uppercase;
  white-space: nowrap;
}
.brand-name .accent {
  background: linear-gradient(135deg, var(--copper-deep) 0%, var(--copper) 25%, var(--copper-shine) 50%, var(--copper) 75%, var(--copper-deep) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 500;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer { to { background-position: 200% center; } }

.brand-subtitle {
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  font-weight: 300;
  color: var(--light-grey);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-top: 5px;
}

.divider-lines {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 15px;
  opacity: 0;
  animation: brand-in 0.8s ease-out 6.3s forwards;
}
.divider-lines::before, .divider-lines::after {
  content: '';
  width: 60px;
  height: 1px;
  align-self: center;
}
.divider-lines::before { background: linear-gradient(90deg, transparent, var(--copper-deep)); }
.divider-lines::after { background: linear-gradient(90deg, var(--copper-deep), transparent); }
.divider-lines-dot {
  width: 6px; height: 6px;
  background: var(--copper);
  border-radius: 50%;
  align-self: center;
  box-shadow: 0 0 10px var(--copper-glow);
}

.admin-tag {
  position: absolute;
  bottom: 11%;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: brand-in 1s ease-out 6.5s forwards;
}
.admin-tag span {
  font-family: 'Poppins', sans-serif;
  background: rgba(184, 115, 51, 0.08);
  border: 1px solid var(--copper-deep);
  color: var(--copper-bright);
  padding: 10px 28px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  backdrop-filter: blur(10px);
  white-space: nowrap;
}

.loading-container {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: brand-in 0.8s ease-out 6.8s forwards;
}
.loading-bar {
  width: 200px;
  height: 1px;
  background: rgba(184, 115, 51, 0.2);
  overflow: hidden;
  position: relative;
}
.loading-bar::after {
  content: '';
  position: absolute;
  top: 0; left: -50%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--copper-shine), transparent);
  animation: loading-slide 1.5s ease-in-out infinite;
}
@keyframes loading-slide { to { left: 100%; } }
.loading-text {
  text-align: center;
  font-family: 'Poppins', sans-serif;
  font-size: 0.65rem;
  color: var(--copper-deep);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 12px;
}

.skip-btn {
  position: absolute;
  bottom: 15px; right: 25px;
  background: none;
  border: 1px solid rgba(184, 115, 51, 0.3);
  color: rgba(184, 115, 51, 0.6);
  padding: 8px 20px;
  border-radius: 4px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  animation: brand-in 0.5s ease-out 7s forwards;
  z-index: 100;
}
.skip-btn:hover {
  color: var(--copper-shine);
  border-color: var(--copper);
  background: rgba(184, 115, 51, 0.1);
}

.corner {
  position: absolute;
  width: 60px; height: 60px;
  border: 1px solid var(--copper-deep);
  opacity: 0;
  animation: brand-in 1s ease-out 6s forwards;
}
.corner-tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
.corner-tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
.corner-bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
.corner-br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

@media(max-width: 768px) {
  .brand-name { font-size: 1.8rem; letter-spacing: 2px; }
  .brand-subtitle { font-size: 0.65rem; letter-spacing: 5px; }
  .dog-runner { width: 280px; height: 220px; }
  .corner { width: 40px; height: 40px; }
  .woof-bubble { font-size: 1.2rem; padding: 7px 16px; }
  .woof-2 { font-size: 1rem; }
}
</style>
</head>
<body>

<div id="splash">

  <div class="aura"></div>
  <div class="aura aura-2"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="ember" style="left:5%;animation-delay:0s"></div>
  <div class="ember" style="left:15%;animation-delay:2s"></div>
  <div class="ember" style="left:25%;animation-delay:4s"></div>
  <div class="ember" style="left:35%;animation-delay:1s"></div>
  <div class="ember" style="left:50%;animation-delay:3s"></div>
  <div class="ember" style="left:65%;animation-delay:5s"></div>
  <div class="ember" style="left:75%;animation-delay:2.5s"></div>
  <div class="ember" style="left:85%;animation-delay:4.5s"></div>
  <div class="ember" style="left:95%;animation-delay:1.5s"></div>

  <div class="copper-dot"></div>

  <!-- Ground line -->
  <div class="ground-line"></div>

  <!-- SKETCH-STYLE RUNNING DOG - Facing LEFT -->
  <div class="dog-runner" id="dogRunner">
    <div class="dog-glow"></div>

    <!-- Copper trail -->
    <div class="copper-trail">
      <div class="trail-line trail-1"></div>
      <div class="trail-line trail-2"></div>
      <div class="trail-line trail-3"></div>
    </div>

    <div class="dog-body">
      <svg width="400" height="280" viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- Metallic copper stroke gradient -->
          <linearGradient id="copperStroke" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#8b5a2b"/>
            <stop offset="25%" style="stop-color:#b87333"/>
            <stop offset="50%" style="stop-color:#ffb87c"/>
            <stop offset="75%" style="stop-color:#e89658"/>
            <stop offset="100%" style="stop-color:#8b5a2b"/>
          </linearGradient>
          <linearGradient id="copperGlowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#e89658;stop-opacity:0.5"/>
            <stop offset="100%" style="stop-color:#8b5a2b;stop-opacity:0.3"/>
          </linearGradient>
          <filter id="copperGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>

        <!-- Group with copper glow filter -->
        <g filter="url(#copperGlow)" stroke="url(#copperStroke)" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

          <!-- TAIL (fluffy, flowing behind) -->
          <g class="dog-tail">
            <path d="M 340 140
                     Q 355 130 370 125
                     Q 380 128 375 138
                     M 340 145
                     Q 358 138 373 140
                     M 335 150
                     Q 350 152 365 148"/>
            <!-- Tail tip fluff -->
            <path d="M 370 130 Q 378 128 380 135 Q 378 140 372 138"/>
          </g>

          <!-- BODY - main curve (facing left) -->
          <path d="M 320 155
                   Q 300 130 240 128
                   Q 180 128 140 145
                   Q 115 155 105 175
                   Q 105 195 130 200
                   Q 175 205 230 205
                   Q 285 202 315 195
                   Q 335 185 325 165 Z"/>

          <!-- Back curve line -->
          <path d="M 240 128 Q 220 125 200 130" opacity="0.7"/>

          <!-- Belly curve -->
          <path d="M 140 195 Q 175 200 225 200" opacity="0.6"/>

          <!-- BACK LEG (further, back) -->
          <g class="leg leg-br">
            <path d="M 290 195
                     Q 288 215 295 235
                     Q 302 245 310 240
                     Q 315 235 312 225
                     L 310 200"/>
            <!-- Back paw -->
            <path d="M 302 245 Q 308 248 315 245 Q 315 240 310 240"/>
          </g>

          <!-- BACK LEG (closer, front bend) -->
          <g class="leg leg-bl">
            <path d="M 240 200
                     Q 235 220 230 240
                     Q 232 250 245 250
                     Q 250 245 248 235
                     L 250 210"/>
            <!-- Back paw closer -->
            <path d="M 232 250 Q 240 253 250 250 Q 252 245 245 245"/>
          </g>

          <!-- FRONT LEG (closer, extended forward) -->
          <g class="leg leg-fr">
            <path d="M 180 195
                     Q 170 215 155 230
                     Q 148 240 155 245
                     Q 165 245 170 235
                     L 180 210"/>
            <!-- Front paw -->
            <path d="M 148 245 Q 155 250 168 247 Q 170 240 162 240"/>
          </g>

          <!-- FRONT LEG (further, bent up in stride) -->
          <g class="leg leg-fl">
            <path d="M 155 190
                     Q 145 200 140 218
                     Q 140 228 148 225
                     Q 152 220 152 208"/>
            <!-- Front paw bent -->
            <path d="M 140 225 Q 148 228 155 224"/>
          </g>

          <!-- NECK - from body to head -->
          <path d="M 130 160
                   Q 115 150 100 145
                   Q 90 140 85 130"/>
          <path d="M 130 175 Q 115 170 105 165" opacity="0.6"/>

          <!-- HEAD -->
          <g class="dog-head">
            <!-- Head main outline -->
            <path d="M 85 130
                     Q 65 125 50 130
                     Q 38 135 32 145
                     Q 30 155 42 160
                     Q 60 162 78 158
                     Q 92 150 88 138
                     Q 88 132 85 130 Z"/>

            <!-- Snout -->
            <path d="M 38 148
                     Q 25 150 20 156
                     Q 20 162 28 162
                     L 42 160"/>

            <!-- Nose -->
            <ellipse cx="22" cy="152" rx="4" ry="3.5" fill="url(#copperStroke)" stroke="url(#copperStroke)"/>

            <!-- Mouth - slightly open -->
            <path d="M 28 162 Q 35 165 42 163"/>

            <!-- Tongue (small, hanging) -->
            <path d="M 32 165 Q 30 172 34 175 Q 38 172 35 165" fill="url(#copperGlowGrad)" opacity="0.7"/>

            <!-- Eye - almond, serene -->
            <path d="M 62 142 Q 68 140 72 143" stroke-width="2"/>
            <ellipse cx="66" cy="143" rx="1.5" ry="1" fill="url(#copperStroke)"/>

            <!-- Eye highlight -->
            <path d="M 60 140 Q 65 138 70 140" opacity="0.5" stroke-width="1"/>

            <!-- EAR - floppy, flowing back -->
            <g class="dog-ear">
              <path d="M 78 135
                       Q 90 138 105 148
                       Q 115 158 108 168
                       Q 100 172 88 165
                       Q 82 155 78 145 Z"/>
              <!-- Ear inner line -->
              <path d="M 85 145 Q 95 152 100 162" opacity="0.5"/>
            </g>
          </g>

          <!-- Body detail lines (fur suggestion) -->
          <path d="M 200 145 Q 210 148 220 145" opacity="0.4"/>
          <path d="M 250 150 Q 260 153 270 150" opacity="0.4"/>
          <path d="M 155 175 Q 165 178 175 175" opacity="0.4"/>

          <!-- Chest curve -->
          <path d="M 130 175 Q 128 185 135 195" opacity="0.5"/>

        </g>

        <!-- Motion lines behind (only while running) -->
        <g class="motion-lines" opacity="0.6" stroke="url(#copperStroke)" stroke-width="1.5" fill="none" stroke-linecap="round">
          <path d="M 370 160 L 395 158" opacity="0.5"/>
          <path d="M 365 175 L 392 173" opacity="0.4"/>
          <path d="M 372 190 L 395 188" opacity="0.3"/>
        </g>

      </svg>
    </div>

    <!-- Woof bubbles (appear to LEFT of dog's head since facing left) -->
    <div class="woof-bubble woof-1">Woof!</div>
    <div class="woof-bubble woof-2">Woof!</div>
  </div>

  <!-- Brand -->
  <div class="brand-container">
    <h1 class="brand-name"><span class="accent">Refuge</span> de la <span class="accent">Tendresse</span></h1>
    <div class="brand-subtitle">Espace Administrateur</div>
    <div class="divider-lines"><div class="divider-lines-dot"></div></div>
  </div>

  <div class="admin-tag">
    <span>Bienvenue &middot; Session Securisee</span>
  </div>

  <div class="loading-container">
    <div class="loading-bar"></div>
    <div class="loading-text">Chargement</div>
  </div>

  <button class="skip-btn" onclick="endSplash()">Passer</button>
</div>

<script>
setTimeout(function() {
  var runner = document.getElementById('dogRunner');
  if (runner) runner.classList.add('arrived');
}, 3500);

setTimeout(function() {
  var runner = document.getElementById('dogRunner');
  if (runner) runner.classList.add('woofing-1');
}, 3700);

setTimeout(function() {
  var runner = document.getElementById('dogRunner');
  if (runner) {
    runner.classList.remove('woofing-1');
    runner.classList.add('woofing-2');
  }
}, 4700);

function endSplash() {
  document.getElementById('splash').classList.add('hide');
  setTimeout(function() {
    if (window.parent && window.parent.splashComplete) {
      window.parent.splashComplete();
    } else {
      window.parent.postMessage('splashDone', '*');
    }
  }, 800);
}

setTimeout(function() { endSplash(); }, 8000);
</script>

</body>
</html>
