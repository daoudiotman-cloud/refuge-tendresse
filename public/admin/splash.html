<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Refuge de la Tendresse - Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --black: #000000;
  --charcoal: #141414;
  --copper: #b87333;
  --copper-bright: #e89658;
  --copper-deep: #8b5a2b;
  --copper-shine: #ffb87c;
  --copper-glow: rgba(184, 115, 51, 0.5);
  --copper-dark: #4a2c15;
  --chrome-white: #f5f0e5;
  --chrome-shine: #ffffff;
  --chrome-shadow: #d4c9b0;
  --warm-white: #faf7f0;
  --light-grey: #c8c8c8;
}

body { font-family: 'Poppins', sans-serif; background: #000; overflow: hidden; }

#splash {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 70%);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow: hidden;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

/* Rotating copper aura */
.aura {
  position: absolute;
  width: 800px; height: 800px;
  background: radial-gradient(circle, var(--copper-glow) 0%, transparent 60%);
  border-radius: 50%;
  animation: rotate 30s linear infinite;
  opacity: 0.35;
  filter: blur(60px);
}
.aura-2 { width: 600px; height: 600px; animation: rotate 25s linear infinite reverse; opacity: 0.25; }
@keyframes rotate { to { transform: rotate(360deg); } }

/* Floating embers */
.ember {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--copper-bright);
  border-radius: 50%;
  opacity: 0;
  box-shadow: 0 0 10px var(--copper-bright), 0 0 20px var(--copper);
  animation: float-up 8s ease-in-out infinite;
}
@keyframes float-up {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 0.8; }
  90% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-20vh) scale(1.5); }
}

/* Copper dot */
.copper-dot {
  width: 8px; height: 8px;
  background: radial-gradient(circle, var(--copper-shine) 0%, var(--copper) 40%, var(--copper-deep) 100%);
  border-radius: 50%;
  position: absolute;
  animation: dot-emerge 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  box-shadow: 0 0 40px var(--copper-glow), 0 0 80px var(--copper-glow);
}
@keyframes dot-emerge {
  0% { width: 8px; height: 8px; opacity: 1; }
  50% { width: 150px; height: 150px; opacity: 1; box-shadow: 0 0 100px var(--copper), 0 0 200px var(--copper-glow); }
  100% { width: 250px; height: 250px; opacity: 0; }
}

/* Beagle container - runs in from right */
.dog-runner {
  position: absolute;
  right: -350px;
  top: 42%;
  transform: translateY(-50%);
  width: 320px;
  height: 320px;
  animation: run-in 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.5s forwards;
  z-index: 10;
}
@keyframes run-in {
  0% { right: -350px; }
  75% { right: calc(50% - 100px); }
  85% { right: calc(50% - 140px); }
  100% { right: calc(50% - 120px); }
}

/* Bouncing motion while running */
.dog-body {
  animation: run-bounce 0.25s ease-in-out infinite;
  transform-origin: center bottom;
}
@keyframes run-bounce {
  0%, 100% { transform: translateY(0) rotate(0deg); }
  25% { transform: translateY(-12px) rotate(-2deg); }
  50% { transform: translateY(-6px) rotate(0deg); }
  75% { transform: translateY(-12px) rotate(2deg); }
}

/* Legs galloping */
.leg-fl, .leg-fr, .leg-bl, .leg-br {
  transform-origin: top center;
  animation: gallop 0.25s ease-in-out infinite;
}
.leg-fl { animation-delay: 0s; }
.leg-fr { animation-delay: 0.125s; }
.leg-bl { animation-delay: 0.125s; }
.leg-br { animation-delay: 0s; }
@keyframes gallop {
  0%, 100% { transform: rotate(-15deg); }
  50% { transform: rotate(15deg); }
}

/* Ears flapping while running */
.ear-l, .ear-r {
  transform-origin: 50% 20%;
  animation: ear-flap 0.4s ease-in-out infinite alternate;
}
@keyframes ear-flap {
  from { transform: rotate(-8deg); }
  to { transform: rotate(8deg); }
}

/* After arrived - settle down */
.dog-runner.arrived .dog-body {
  animation: settle 0.6s ease-out forwards;
}
@keyframes settle {
  0% { transform: translateY(-6px) rotate(0deg); }
  40% { transform: translateY(5px) rotate(0deg); }
  70% { transform: translateY(-2px) rotate(0deg); }
  100% { transform: translateY(0) rotate(0deg); }
}
.dog-runner.arrived .leg-fl,
.dog-runner.arrived .leg-fr,
.dog-runner.arrived .leg-bl,
.dog-runner.arrived .leg-br {
  animation: settle-legs 0.4s ease-out forwards;
}
@keyframes settle-legs {
  to { transform: rotate(0deg); }
}
.dog-runner.arrived .ear-l,
.dog-runner.arrived .ear-r {
  animation: ears-settle 0.5s ease-out forwards;
}
@keyframes ears-settle {
  0% { transform: rotate(8deg); }
  50% { transform: rotate(-3deg); }
  100% { transform: rotate(0deg); }
}

/* Copper glow when arrived */
.dog-glow {
  position: absolute;
  inset: -40px;
  background: radial-gradient(circle, var(--copper-glow) 0%, transparent 60%);
  border-radius: 50%;
  filter: blur(35px);
  opacity: 0;
  z-index: -1;
}
.dog-runner.arrived .dog-glow { animation: glow-in 1s ease-out forwards; }
@keyframes glow-in { to { opacity: 1; } }

/* Head bark motion */
.dog-head { transform-origin: 30% 100%; }
.dog-runner.woofing-1 .dog-head { animation: bark 0.5s ease-in-out; }
.dog-runner.woofing-2 .dog-head { animation: bark 0.5s ease-in-out; }
@keyframes bark {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  30% { transform: rotate(-10deg) translateY(-8px); }
  50% { transform: rotate(-5deg) translateY(-4px); }
  70% { transform: rotate(-8deg) translateY(-6px); }
}

/* Tail wag */
.dog-tail { transform-origin: 85% 60%; }
.dog-runner.arrived .dog-tail {
  animation: wag 0.35s ease-in-out infinite alternate;
}
@keyframes wag {
  from { transform: rotate(-20deg); }
  to { transform: rotate(20deg); }
}

/* Blinking eyes */
.dog-eye { transform-origin: center; }
.dog-runner.arrived .dog-eye {
  animation: blink 4s ease-in-out infinite;
}
@keyframes blink {
  0%, 92%, 100% { transform: scaleY(1); }
  95% { transform: scaleY(0.1); }
}

/* Tongue wiggle */
.dog-tongue {
  transform-origin: top center;
}
.dog-runner.arrived .dog-tongue {
  animation: tongue-wiggle 1s ease-in-out infinite alternate;
}
@keyframes tongue-wiggle {
  from { transform: rotate(-3deg) scaleY(1); }
  to { transform: rotate(3deg) scaleY(1.05); }
}

/* Woof bubbles */
.woof-bubble {
  position: absolute;
  background: linear-gradient(135deg, var(--copper) 0%, var(--copper-bright) 100%);
  color: var(--black);
  padding: 10px 22px;
  border-radius: 25px 25px 25px 5px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 1.6rem;
  opacity: 0;
  transform: scale(0);
  box-shadow: 0 8px 30px var(--copper-glow), inset 0 1px 0 var(--copper-shine);
  border: 2px solid var(--copper-shine);
  white-space: nowrap;
  z-index: 20;
  letter-spacing: 1px;
}
.woof-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 15px;
  width: 0; height: 0;
  border-left: 10px solid var(--copper);
  border-right: 10px solid transparent;
  border-top: 10px solid var(--copper);
  border-bottom: 10px solid transparent;
}

.woof-1 {
  top: 20px;
  right: 20px;
  animation: woof-pop 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 3.7s forwards;
}
.woof-2 {
  top: 55px;
  right: 0;
  font-size: 1.3rem;
  animation: woof-pop 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 4.7s forwards;
}
@keyframes woof-pop {
  0% { opacity: 0; transform: scale(0) rotate(-15deg); }
  20% { opacity: 1; transform: scale(1.3) rotate(5deg); }
  35% { transform: scale(1) rotate(0deg); }
  80% { opacity: 1; transform: scale(1) rotate(0deg); }
  100% { opacity: 0; transform: scale(0.9) translateY(-20px); }
}

/* Brand text */
.brand-container {
  position: absolute;
  bottom: 20%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  opacity: 0;
  animation: brand-in 1.2s ease-out 5.8s forwards;
  z-index: 5;
}
@keyframes brand-in {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); letter-spacing: 15px; }
  to { opacity: 1; transform: translateX(-50%) translateY(0); letter-spacing: 4px; }
}

.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 400;
  color: var(--warm-white);
  letter-spacing: 4px;
  margin-bottom: 8px;
  text-transform: uppercase;
  white-space: nowrap;
}
.brand-name .accent {
  background: linear-gradient(135deg, var(--copper-deep) 0%, var(--copper) 25%, var(--copper-shine) 50%, var(--copper) 75%, var(--copper-deep) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 500;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer { to { background-position: 200% center; } }

.brand-subtitle {
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  font-weight: 300;
  color: var(--light-grey);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-top: 5px;
}

.divider-lines {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-top: 15px;
  opacity: 0;
  animation: brand-in 0.8s ease-out 6.3s forwards;
}
.divider-lines::before, .divider-lines::after {
  content: '';
  width: 60px;
  height: 1px;
  align-self: center;
}
.divider-lines::before { background: linear-gradient(90deg, transparent, var(--copper-deep)); }
.divider-lines::after { background: linear-gradient(90deg, var(--copper-deep), transparent); }
.divider-lines-dot {
  width: 6px; height: 6px;
  background: var(--copper);
  border-radius: 50%;
  align-self: center;
  box-shadow: 0 0 10px var(--copper-glow);
}

/* Admin tag */
.admin-tag {
  position: absolute;
  bottom: 13%;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: brand-in 1s ease-out 6.5s forwards;
}
.admin-tag span {
  font-family: 'Poppins', sans-serif;
  background: rgba(184, 115, 51, 0.08);
  border: 1px solid var(--copper-deep);
  color: var(--copper-bright);
  padding: 10px 28px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  backdrop-filter: blur(10px);
  white-space: nowrap;
}

.loading-container {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: brand-in 0.8s ease-out 6.8s forwards;
}
.loading-bar {
  width: 200px;
  height: 1px;
  background: rgba(184, 115, 51, 0.2);
  overflow: hidden;
  position: relative;
}
.loading-bar::after {
  content: '';
  position: absolute;
  top: 0; left: -50%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--copper-shine), transparent);
  animation: loading-slide 1.5s ease-in-out infinite;
}
@keyframes loading-slide { to { left: 100%; } }
.loading-text {
  text-align: center;
  font-family: 'Poppins', sans-serif;
  font-size: 0.65rem;
  color: var(--copper-deep);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 12px;
}

.skip-btn {
  position: absolute;
  bottom: 25px; right: 30px;
  background: none;
  border: 1px solid rgba(184, 115, 51, 0.3);
  color: rgba(184, 115, 51, 0.6);
  padding: 8px 20px;
  border-radius: 4px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  animation: brand-in 0.5s ease-out 7s forwards;
  z-index: 100;
}
.skip-btn:hover {
  color: var(--copper-shine);
  border-color: var(--copper);
  background: rgba(184, 115, 51, 0.1);
}

.corner {
  position: absolute;
  width: 60px; height: 60px;
  border: 1px solid var(--copper-deep);
  opacity: 0;
  animation: brand-in 1s ease-out 6s forwards;
}
.corner-tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
.corner-tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
.corner-bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
.corner-br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

@media(max-width: 768px) {
  .brand-name { font-size: 1.8rem; letter-spacing: 2px; }
  .brand-subtitle { font-size: 0.65rem; letter-spacing: 5px; }
  .dog-runner { width: 220px; height: 220px; }
  .corner { width: 40px; height: 40px; }
  .woof-bubble { font-size: 1.2rem; padding: 7px 16px; }
  .woof-2 { font-size: 1rem; }
}
</style>
</head>
<body>

<div id="splash">

  <div class="aura"></div>
  <div class="aura aura-2"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="ember" style="left:5%;animation-delay:0s"></div>
  <div class="ember" style="left:15%;animation-delay:2s"></div>
  <div class="ember" style="left:25%;animation-delay:4s"></div>
  <div class="ember" style="left:35%;animation-delay:1s"></div>
  <div class="ember" style="left:50%;animation-delay:3s"></div>
  <div class="ember" style="left:65%;animation-delay:5s"></div>
  <div class="ember" style="left:75%;animation-delay:2.5s"></div>
  <div class="ember" style="left:85%;animation-delay:4.5s"></div>
  <div class="ember" style="left:95%;animation-delay:1.5s"></div>

  <div class="copper-dot"></div>

  <!-- METALLIC BEAGLE (based on your image) -->
  <div class="dog-runner" id="dogRunner">
    <div class="dog-glow"></div>

    <div class="dog-body">
      <svg width="320" height="280" viewBox="0 0 320 280" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- METALLIC COPPER for body -->
          <linearGradient id="metallicCopper" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffb87c"/>
            <stop offset="20%" style="stop-color:#e89658"/>
            <stop offset="50%" style="stop-color:#b87333"/>
            <stop offset="80%" style="stop-color:#8b5a2b"/>
            <stop offset="100%" style="stop-color:#5a3a1c"/>
          </linearGradient>
          <linearGradient id="copperHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#ffb87c;stop-opacity:0.8"/>
            <stop offset="50%" style="stop-color:#fff;stop-opacity:0.6"/>
            <stop offset="100%" style="stop-color:#ffb87c;stop-opacity:0.4"/>
          </linearGradient>
          <linearGradient id="copperShadow" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#8b5a2b"/>
            <stop offset="100%" style="stop-color:#4a2c15"/>
          </linearGradient>

          <!-- CHROME WHITE for belly/face/paws -->
          <linearGradient id="chromeWhite" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff"/>
            <stop offset="30%" style="stop-color:#f5f0e5"/>
            <stop offset="70%" style="stop-color:#e5dcc5"/>
            <stop offset="100%" style="stop-color:#c9bea0"/>
          </linearGradient>
          <linearGradient id="chromeShine" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#fff;stop-opacity:0.9"/>
            <stop offset="100%" style="stop-color:#fff;stop-opacity:0.3"/>
          </linearGradient>

          <!-- DARK COPPER OUTLINE -->
          <linearGradient id="darkOutline" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#5a3a1c"/>
            <stop offset="100%" style="stop-color:#2a1808"/>
          </linearGradient>

          <!-- Nose gradient -->
          <radialGradient id="noseMetal" cx="30%" cy="30%">
            <stop offset="0%" style="stop-color:#8b5a2b"/>
            <stop offset="50%" style="stop-color:#4a2c15"/>
            <stop offset="100%" style="stop-color:#1a0a02"/>
          </radialGradient>

          <!-- Shine spots -->
          <radialGradient id="shineSpot" cx="30%" cy="30%">
            <stop offset="0%" style="stop-color:#fff;stop-opacity:0.8"/>
            <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
          </radialGradient>

          <!-- Tongue metallic -->
          <linearGradient id="tongueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ff8fab"/>
            <stop offset="100%" style="stop-color:#c9426e"/>
          </linearGradient>
        </defs>

        <!-- SHADOW under dog -->
        <ellipse cx="160" cy="255" rx="90" ry="8" fill="#000" opacity="0.4"/>

        <!-- TAIL - curved, copper with white tip (bottom layer) -->
        <g class="dog-tail">
          <path d="M 60 155
                   Q 30 145 15 155
                   Q 5 165 15 175
                   Q 25 180 45 175
                   Q 60 170 75 168 Z"
                fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
          <!-- White tip -->
          <path d="M 15 155 Q 5 165 15 175 Q 20 172 22 168 Q 18 162 15 155 Z"
                fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
          <!-- Tail highlight -->
          <path d="M 30 155 Q 45 152 60 158" stroke="url(#copperHighlight)" stroke-width="2" fill="none" opacity="0.7"/>
        </g>

        <!-- BACK LEGS -->
        <g class="leg-bl">
          <path d="M 105 195
                   L 100 240
                   Q 100 250 115 250
                   Q 130 250 128 240
                   L 130 195 Z"
                fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
          <!-- White paw -->
          <ellipse cx="115" cy="248" rx="18" ry="8" fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3"/>
          <!-- Toe lines -->
          <path d="M 108 250 L 108 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
          <path d="M 115 251 L 115 247" stroke="url(#darkOutline)" stroke-width="1.5"/>
          <path d="M 122 250 L 122 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
        </g>

        <g class="leg-br">
          <path d="M 190 195
                   L 185 240
                   Q 185 250 200 250
                   Q 215 250 213 240
                   L 215 195 Z"
                fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
          <ellipse cx="200" cy="248" rx="18" ry="8" fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3"/>
          <path d="M 193 250 L 193 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
          <path d="M 200 251 L 200 247" stroke="url(#darkOutline)" stroke-width="1.5"/>
          <path d="M 207 250 L 207 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
        </g>

        <!-- BODY (chubby beagle body) -->
        <path d="M 75 155
                 Q 65 130 90 115
                 Q 130 105 180 108
                 Q 230 112 235 145
                 Q 240 180 220 200
                 Q 190 215 150 213
                 Q 100 210 75 190
                 Q 65 175 75 155 Z"
              fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="4" stroke-linejoin="round"/>

        <!-- WHITE BELLY -->
        <path d="M 100 175
                 Q 130 170 175 175
                 Q 210 178 215 195
                 Q 210 210 175 210
                 Q 130 213 105 205
                 Q 90 195 100 175 Z"
              fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3.5" stroke-linejoin="round"/>

        <!-- Body shine highlight -->
        <ellipse cx="150" cy="130" rx="60" ry="12" fill="url(#copperHighlight)" opacity="0.6"/>
        <!-- Metallic reflection spot -->
        <ellipse cx="130" cy="140" rx="30" ry="8" fill="url(#shineSpot)"/>

        <!-- FRONT LEGS -->
        <g class="leg-fl">
          <path d="M 125 190
                   L 122 240
                   Q 122 250 137 250
                   Q 152 250 150 240
                   L 150 190 Z"
                fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
          <ellipse cx="137" cy="248" rx="18" ry="8" fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3"/>
          <path d="M 130 250 L 130 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
          <path d="M 137 251 L 137 247" stroke="url(#darkOutline)" stroke-width="1.5"/>
          <path d="M 144 250 L 144 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
        </g>

        <g class="leg-fr">
          <path d="M 168 190
                   L 165 240
                   Q 165 250 180 250
                   Q 195 250 193 240
                   L 193 190 Z"
                fill="url(#metallicCopper)" stroke="url(#darkOutline)" stroke-width="3" stroke-linejoin="round"/>
          <ellipse cx="180" cy="248" rx="18" ry="8" fill="url(#chromeWhite)" stroke="url(#darkOutline)" stroke-width="3"/>
          <path d="M 173 250 L 173 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
          <path d="M 180 251 L 180 247" stroke="url(#darkOutline)" stroke-width="1.5"/>
          <path d="M 187 250 L 187 246" stroke="url(#darkOutline)" stroke-width="1.5"/>
        </g>

        <!-- LEFT EAR (further, behind head) -->
        <g class="ear-l">
          <path d="M 195 75
                   Q 175 65 172 85

<script>
setTimeout(function() {
  var runner = document.getElementById('dogRunner');
  if (runner) runner.classList.add('arrived');
}, 3500);

setTimeout(function() {
  var runner = document.getElementById('dogRunner');
  if (runner) runner.classList.add('woofing-1');
}, 3700);

setTimeout(function() {
  var runner = document.getElementById('dogRunner');
  if (runner) {
    runner.classList.remove('woofing-1');
    runner.classList.add('woofing-2');
  }
}, 4700);

function endSplash() {
  document.getElementById('splash').classList.add('hide');
  setTimeout(function() {
    if (window.parent && window.parent.splashComplete) {
      window.parent.splashComplete();
    } else {
      window.parent.postMessage('splashDone', '*');
    }
  }, 800);
}

setTimeout(function() { endSplash(); }, 8000);
</script>
