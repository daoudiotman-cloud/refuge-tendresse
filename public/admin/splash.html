<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Refuge de la Tendresse - Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --black: #000000;
  --off-black: #0a0a0a;
  --charcoal: #141414;
  --copper: #b87333;
  --copper-bright: #e89658;
  --copper-deep: #8b5a2b;
  --copper-shine: #ffb87c;
  --copper-glow: rgba(184, 115, 51, 0.5);
  --warm-white: #faf7f0;
  --light-grey: #c8c8c8;
}

body {
  font-family: 'Poppins', sans-serif;
  background: #000;
  overflow: hidden;
}

#splash {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 70%);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow: hidden;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

/* Rotating copper aura */
.aura {
  position: absolute;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, var(--copper-glow) 0%, transparent 60%);
  border-radius: 50%;
  animation: rotate 30s linear infinite;
  opacity: 0.4;
  filter: blur(60px);
}
.aura-2 {
  width: 600px;
  height: 600px;
  animation: rotate 25s linear infinite reverse;
  opacity: 0.3;
  animation-delay: -10s;
}
@keyframes rotate {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Floating embers (particles) */
.ember {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--copper-bright);
  border-radius: 50%;
  opacity: 0;
  box-shadow: 0 0 10px var(--copper-bright), 0 0 20px var(--copper);
  animation: float-up 8s ease-in-out infinite;
}
@keyframes float-up {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 0.8; }
  90% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-20vh) scale(1.5); }
}

/* Golden dot that grows */
.copper-dot {
  width: 8px; height: 8px;
  background: radial-gradient(circle, var(--copper-shine) 0%, var(--copper) 40%, var(--copper-deep) 100%);
  border-radius: 50%;
  position: absolute;
  animation: dot-emerge 1.8s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  box-shadow: 0 0 40px var(--copper-glow), 0 0 80px var(--copper-glow);
}
@keyframes dot-emerge {
  0% {
    width: 8px; height: 8px;
    opacity: 1;
    box-shadow: 0 0 20px var(--copper);
  }
  50% {
    width: 150px; height: 150px;
    opacity: 1;
    box-shadow: 0 0 100px var(--copper), 0 0 200px var(--copper-glow);
  }
  100% {
    width: 250px; height: 250px;
    opacity: 0;
    box-shadow: 0 0 200px var(--copper-glow);
  }
}

/* Dog silhouette container */
.dog-showcase {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  transform: scale(0.8) translateY(20px);
  animation: showcase-in 1.2s cubic-bezier(0.4, 0, 0.2, 1) 1.5s forwards;
}
@keyframes showcase-in {
  0% { opacity: 0; transform: scale(0.8) translateY(20px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

/* Ambient light behind dog */
.dog-glow {
  position: absolute;
  width: 350px; height: 350px;
  background: radial-gradient(circle, var(--copper-glow) 0%, transparent 60%);
  border-radius: 50%;
  filter: blur(30px);
  animation: pulse-glow 3s ease-in-out infinite;
  z-index: -1;
}
@keyframes pulse-glow {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.1); }
}

/* Refined dog SVG */
.luxury-dog {
  width: 180px;
  height: 180px;
  filter: drop-shadow(0 20px 40px var(--copper-glow)) drop-shadow(0 0 30px var(--copper-glow));
}

/* Elegant divider lines */
.divider-line {
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--copper) 50%, transparent 100%);
  width: 0;
  animation: expand-line 1s ease-out 2.5s forwards;
  margin: 30px 0 25px;
}
@keyframes expand-line {
  to { width: 300px; }
}

/* Brand name - elegant serif */
.brand-container {
  text-align: center;
  opacity: 0;
  animation: brand-fade-in 1.2s ease-out 2.8s forwards;
}
@keyframes brand-fade-in {
  from { opacity: 0; transform: translateY(20px); letter-spacing: 15px; }
  to { opacity: 1; transform: translateY(0); letter-spacing: 4px; }
}

.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 400;
  color: var(--warm-white);
  letter-spacing: 4px;
  margin-bottom: 8px;
  text-transform: uppercase;
}
.brand-name .accent {
  background: linear-gradient(135deg, var(--copper-deep) 0%, var(--copper) 25%, var(--copper-shine) 50%, var(--copper) 75%, var(--copper-deep) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 500;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer {
  to { background-position: 200% center; }
}

.brand-subtitle {
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  font-weight: 300;
  color: var(--light-grey);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-top: 5px;
}

/* Bottom divider */
.bottom-divider {
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--copper-deep) 50%, transparent 100%);
  width: 0;
  animation: expand-line 1s ease-out 3.5s forwards;
  margin-top: 25px;
}

/* Admin greeting */
.admin-tag {
  margin-top: 35px;
  opacity: 0;
  animation: brand-fade-in 1s ease-out 3.8s forwards;
}
.admin-tag span {
  font-family: 'Poppins', sans-serif;
  background: rgba(184, 115, 51, 0.08);
  border: 1px solid var(--copper-deep);
  color: var(--copper-bright);
  padding: 10px 28px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  backdrop-filter: blur(10px);
}

/* Loading indicator - minimalist */
.loading-container {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: brand-fade-in 0.8s ease-out 4.2s forwards;
}
.loading-bar {
  width: 200px;
  height: 1px;
  background: rgba(184, 115, 51, 0.2);
  overflow: hidden;
  position: relative;
}
.loading-bar::after {
  content: '';
  position: absolute;
  top: 0;
  left: -50%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--copper-shine), transparent);
  animation: loading-slide 1.5s ease-in-out infinite;
}
@keyframes loading-slide {
  to { left: 100%; }
}
.loading-text {
  text-align: center;
  font-family: 'Poppins', sans-serif;
  font-size: 0.65rem;
  color: var(--copper-deep);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 12px;
}

/* Skip button - elegant */
.skip-btn {
  position: absolute;
  bottom: 25px;
  right: 30px;
  background: none;
  border: 1px solid rgba(184, 115, 51, 0.3);
  color: rgba(184, 115, 51, 0.6);
  padding: 8px 20px;
  border-radius: 4px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  animation: brand-fade-in 0.5s ease-out 4.5s forwards;
}
.skip-btn:hover {
  color: var(--copper-shine);
  border-color: var(--copper);
  background: rgba(184, 115, 51, 0.1);
}

/* Corner decorative elements */
.corner {
  position: absolute;
  width: 60px;
  height: 60px;
  border: 1px solid var(--copper-deep);
  opacity: 0;
  animation: brand-fade-in 1s ease-out 3s forwards;
}
.corner-tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
.corner-tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
.corner-bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
.corner-br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

@media(max-width: 600px) {
  .brand-name { font-size: 1.8rem; letter-spacing: 2px; }
  .brand-subtitle { font-size: 0.65rem; letter-spacing: 5px; }
  .luxury-dog { width: 140px; height: 140px; }
  .divider-line, .bottom-divider { width: 220px; }
  .corner { width: 40px; height: 40px; }
  .corner-tl, .corner-tr { top: 15px; }
  .corner-bl, .corner-br { bottom: 15px; }
}
</style>
</head>
<body>

<div id="splash">

  <!-- Rotating auras -->
  <div class="aura"></div>
  <div class="aura aura-2"></div>

  <!-- Corner frames -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Floating embers -->
  <div class="ember" style="left:5%;animation-delay:0s"></div>
  <div class="ember" style="left:15%;animation-delay:2s"></div>
  <div class="ember" style="left:25%;animation-delay:4s"></div>
  <div class="ember" style="left:35%;animation-delay:1s"></div>
  <div class="ember" style="left:50%;animation-delay:3s"></div>
  <div class="ember" style="left:65%;animation-delay:5s"></div>
  <div class="ember" style="left:75%;animation-delay:2.5s"></div>
  <div class="ember" style="left:85%;animation-delay:4.5s"></div>
  <div class="ember" style="left:95%;animation-delay:1.5s"></div>

  <!-- Growing copper dot -->
  <div class="copper-dot"></div>

  <!-- Dog showcase -->
  <div class="dog-showcase">
    <div class="dog-glow"></div>

    <!-- REFINED DOG SVG - Elegant standing silhouette -->
    <svg class="luxury-dog" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <!-- Polished copper gradient -->
        <linearGradient id="copperGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#8b5a2b"/>
          <stop offset="25%" style="stop-color:#b87333"/>
          <stop offset="50%" style="stop-color:#ffb87c"/>
          <stop offset="75%" style="stop-color:#e89658"/>
          <stop offset="100%" style="stop-color:#8b5a2b"/>
        </linearGradient>
        <linearGradient id="copperDark" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" style="stop-color:#b87333"/>
          <stop offset="100%" style="stop-color:#5a3a1c"/>
        </linearGradient>
        <linearGradient id="copperHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#ffb87c"/>
          <stop offset="100%" style="stop-color:#e89658"/>
        </linearGradient>
        <radialGradient id="shineSpot" cx="30%" cy="30%">
          <stop offset="0%" style="stop-color:#fff;stop-opacity:0.6"/>
          <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
        </radialGradient>
      </defs>

      <!-- Elegant standing dog silhouette (Greyhound / Doberman style - refined) -->

      <!-- Back leg (further) -->
      <path d="M 130 130 L 128 175 L 138 175 L 140 130 Z" fill="url(#copperDark)"/>
      <ellipse cx="134" cy="177" rx="8" ry="3" fill="#5a3a1c"/>

      <!-- Front leg (further) -->
      <path d="M 80 130 L 78 175 L 88 175 L 90 130 Z" fill="url(#copperDark)"/>
      <ellipse cx="84" cy="177" rx="8" ry="3" fill="#5a3a1c"/>

      <!-- Body - sleek and refined -->
      <path d="M 65 100
               Q 60 90 70 82
               L 145 78
               Q 165 82 160 100
               Q 165 115 155 128
               L 75 132
               Q 60 125 65 100 Z"
            fill="url(#copperGrad)"/>

      <!-- Body highlight -->
      <path d="M 75 88 Q 100 82 140 85 L 138 95 Q 100 92 75 95 Z"
            fill="url(#copperHighlight)" opacity="0.5"/>

      <!-- Back leg (closer) -->
      <path d="M 125 130 L 122 178 L 133 178 L 136 130 Z" fill="url(#copperGrad)"/>
      <ellipse cx="128" cy="180" rx="9" ry="3.5" fill="url(#copperDark)"/>

      <!-- Front leg (closer) -->
      <path d="M 75 130 L 72 178 L 83 178 L 86 130 Z" fill="url(#copperGrad)"/>
      <ellipse cx="78" cy="180" rx="9" ry="3.5" fill="url(#copperDark)"/>

      <!-- Chest curve -->
      <path d="M 65 100 Q 55 115 62 128" fill="url(#copperDark)" opacity="0.6"/>

      <!-- Elegant tail - curved upward -->
      <path d="M 158 92
               Q 175 78 180 60
               Q 182 52 178 48
               Q 174 46 172 52
               Q 170 65 165 78
               Q 158 88 155 95 Z"
            fill="url(#copperGrad)"/>
      <path d="M 172 55 Q 176 50 178 55" stroke="url(#copperHighlight)" stroke-width="1" fill="none" opacity="0.7"/>

      <!-- Neck - graceful arch -->
      <path d="M 55 88
               Q 45 75 50 60
               Q 55 50 68 48
               L 72 82 Z"
            fill="url(#copperGrad)"/>

      <!-- Head - refined, elongated -->
      <ellipse cx="55" cy="55" rx="22" ry="18" fill="url(#copperGrad)" transform="rotate(-15 55 55)"/>

      <!-- Snout -->
      <path d="M 35 58
               Q 25 58 22 63
               Q 20 68 25 70
               L 40 70
               Q 45 65 45 60 Z"
            fill="url(#copperDark)"/>

      <!-- Head highlight -->
      <ellipse cx="52" cy="48" rx="12" ry="6" fill="url(#copperHighlight)" opacity="0.4" transform="rotate(-15 52 48)"/>

      <!-- Ears - elegant, folded back -->
      <path d="M 60 40
               Q 55 25 65 22
               Q 72 25 70 42 Z"
            fill="url(#copperDark)"/>
      <path d="M 62 32 Q 65 27 68 32" fill="url(#copperGrad)" opacity="0.5"/>

      <!-- Eye - subtle, closed/serene -->
      <path d="M 45 55 Q 50 53 55 55" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round"/>

      <!-- Nose - refined -->
      <ellipse cx="24" cy="65" rx="3" ry="2.5" fill="#1a1a1a"/>
      <circle cx="23" cy="64" r="0.8" fill="#fff" opacity="0.5"/>

      <!-- Subtle mouth line -->
      <path d="M 26 70 Q 32 72 38 70" stroke="#5a3a1c" stroke-width="0.8" fill="none" stroke-linecap="round"/>

      <!-- Elegant collar with tag -->
      <ellipse cx="55" cy="82" rx="20" ry="4" fill="none" stroke="url(#copperDark)" stroke-width="2"/>
      <circle cx="55" cy="88" r="4" fill="url(#copperGrad)" stroke="#5a3a1c" stroke-width="0.5"/>
      <circle cx="54" cy="86" r="1.5" fill="url(#copperHighlight)" opacity="0.8"/>

      <!-- Shine spot on body for metallic effect -->
      <ellipse cx="95" cy="95" rx="20" ry="8" fill="url(#shineSpot)"/>
    </svg>

    <div class="divider-line"></div>

    <div class="brand-container">
      <h1 class="brand-name"><span class="accent">Refuge</span> de la <span class="accent">Tendresse</span></h1>
      <div class="brand-subtitle">Espace Administrateur</div>
    </div>

    <div class="bottom-divider"></div>

    <div class="admin-tag">
      <span>Bienvenue &middot; Session Securisee</span>
    </div>
  </div>

  <!-- Loading indicator -->
  <div class="loading-container">
    <div class="loading-bar"></div>
    <div class="loading-text">Chargement</div>
  </div>

  <!-- Skip -->
  <button class="skip-btn" onclick="endSplash()">Passer</button>
</div>

<script>
function endSplash() {
  document.getElementById('splash').classList.add('hide');
  setTimeout(function() {
    if (window.parent && window.parent.splashComplete) {
      window.parent.splashComplete();
    } else {
      window.parent.postMessage('splashDone', '*');
    }
  }, 800);
}

// Auto-end after 6.5 seconds
setTimeout(function() { endSplash(); }, 6500);
</script>

</body>
</html>
