<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Refuge de la Tendresse - Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --black: #000000;
  --off-black: #0a0a0a;
  --charcoal: #141414;
  --copper: #b87333;
  --copper-bright: #e89658;
  --copper-deep: #8b5a2b;
  --copper-shine: #ffb87c;
  --copper-glow: rgba(184, 115, 51, 0.5);
  --warm-white: #faf7f0;
  --light-grey: #c8c8c8;
}

body { font-family: 'Poppins', sans-serif; background: #000; overflow: hidden; }

#splash {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, #1a1a1a 0%, #000 70%);
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  overflow: hidden;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#splash.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }

/* Rotating copper aura */
.aura {
  position: absolute;
  width: 800px; height: 800px;
  background: radial-gradient(circle, var(--copper-glow) 0%, transparent 60%);
  border-radius: 50%;
  animation: rotate 30s linear infinite;
  opacity: 0.4;
  filter: blur(60px);
}
.aura-2 { width: 600px; height: 600px; animation: rotate 25s linear infinite reverse; opacity: 0.3; }
@keyframes rotate { to { transform: rotate(360deg); } }

/* Floating embers */
.ember {
  position: absolute;
  width: 3px; height: 3px;
  background: var(--copper-bright);
  border-radius: 50%;
  opacity: 0;
  box-shadow: 0 0 10px var(--copper-bright), 0 0 20px var(--copper);
  animation: float-up 8s ease-in-out infinite;
}
@keyframes float-up {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 0.8; }
  90% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-20vh) scale(1.5); }
}

/* Growing copper dot */
.copper-dot {
  width: 8px; height: 8px;
  background: radial-gradient(circle, var(--copper-shine) 0%, var(--copper) 40%, var(--copper-deep) 100%);
  border-radius: 50%;
  position: absolute;
  animation: dot-emerge 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  box-shadow: 0 0 40px var(--copper-glow), 0 0 80px var(--copper-glow);
}
@keyframes dot-emerge {
  0% { width: 8px; height: 8px; opacity: 1; }
  50% { width: 150px; height: 150px; opacity: 1; box-shadow: 0 0 100px var(--copper), 0 0 200px var(--copper-glow); }
  100% { width: 250px; height: 250px; opacity: 0; }
}

/* Dust trail behind running dog */
.dust-trail {
  position: absolute;
  top: 50%;
  right: -50px;
  transform: translateY(-30px);
  width: 100vw;
  height: 3px;
  opacity: 0;
  animation: dust-appear 1.5s ease-out 1.5s forwards;
}
.dust-particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--copper-deep);
  border-radius: 50%;
  opacity: 0;
  filter: blur(1px);
  box-shadow: 0 0 6px var(--copper);
}
@keyframes dust-appear {
  0% { opacity: 0; }
  30% { opacity: 1; }
  100% { opacity: 0; }
}
@keyframes dust-fly {
  0% { opacity: 0.8; transform: translateX(0) translateY(0) scale(1); }
  100% { opacity: 0; transform: translateX(100px) translateY(-30px) scale(0); }
}

/* Dog container - runs in from right */
.dog-runner {
  position: absolute;
  right: -300px;
  top: 45%;
  transform: translateY(-50%);
  width: 250px;
  height: 250px;
  animation: run-in 2s cubic-bezier(0.25, 0.46, 0.45, 0.94) 1.5s forwards;
  z-index: 10;
}
@keyframes run-in {
  0% { right: -300px; }
  75% { right: calc(50% - 60px); }
  85% { right: calc(50% - 90px); }
  100% { right: calc(50% - 75px); }
}

/* Dog bouncing (running motion) */
.dog-body {
  animation: run-bounce 0.3s ease-in-out infinite;
}
@keyframes run-bounce {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

/* After running - stop bouncing, settle */
.dog-runner.arrived .dog-body {
  animation: settle 0.5s ease-out forwards;
}
@keyframes settle {
  0% { transform: translateY(-8px); }
  50% { transform: translateY(2px); }
  100% { transform: translateY(0); }
}

/* Dog glow (activates when arrived) */
.dog-glow {
  position: absolute;
  inset: -30px;
  background: radial-gradient(circle, var(--copper-glow) 0%, transparent 60%);
  border-radius: 50%;
  filter: blur(30px);
  opacity: 0;
  z-index: -1;
}
.dog-runner.arrived .dog-glow {
  animation: glow-in 1s ease-out forwards;
}
@keyframes glow-in {
  to { opacity: 1; }
}

/* Head bark animation */
.dog-head {
  transform-origin: 50% 100%;
}
.dog-runner.woofing-1 .dog-head { animation: bark 0.4s ease-in-out; }
.dog-runner.woofing-2 .dog-head { animation: bark 0.4s ease-in-out; }
@keyframes bark {
  0%, 100% { transform: rotate(0deg) translateY(0); }
  30% { transform: rotate(-8deg) translateY(-5px); }
  60% { transform: rotate(-4deg) translateY(-3px); }
}

/* Tail wag when arrived */
.dog-tail {
  transform-origin: 90% 60%;
}
.dog-runner.arrived .dog-tail {
  animation: wag 0.5s ease-in-out infinite alternate;
}
@keyframes wag {
  from { transform: rotate(-15deg); }
  to { transform: rotate(15deg); }
}

/* Woof bubbles */
.woof-bubble {
  position: absolute;
  top: 30px;
  right: -10px;
  background: linear-gradient(135deg, var(--copper) 0%, var(--copper-bright) 100%);
  color: var(--black);
  padding: 8px 18px;
  border-radius: 20px 20px 20px 4px;
  font-family: 'Cormorant Garamond', serif;
  font-weight: 700;
  font-style: italic;
  font-size: 1.4rem;
  opacity: 0;
  transform: scale(0);
  box-shadow: 0 5px 25px var(--copper-glow), inset 0 1px 0 var(--copper-shine);
  border: 1px solid var(--copper-shine);
  white-space: nowrap;
  z-index: 20;
  letter-spacing: 1px;
}
.woof-bubble::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 12px;
  width: 0; height: 0;
  border-left: 8px solid var(--copper);
  border-right: 8px solid transparent;
  border-top: 8px solid var(--copper);
  border-bottom: 8px solid transparent;
}

.woof-1 {
  animation: woof-pop 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 3.5s forwards;
}
.woof-2 {
  top: 60px;
  right: -30px;
  font-size: 1.2rem;
  animation: woof-pop 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) 4.5s forwards;
}
@keyframes woof-pop {
  0% { opacity: 0; transform: scale(0) rotate(-10deg); }
  20% { opacity: 1; transform: scale(1.3) rotate(3deg); }
  30% { transform: scale(1) rotate(0deg); }
  80% { opacity: 1; transform: scale(1) rotate(0deg); }
  100% { opacity: 0; transform: scale(0.9) translateY(-15px); }
}

/* Elegant dividers */
.divider-line {
  height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--copper) 50%, transparent 100%);
  width: 0;
  animation: expand-line 1s ease-out 5.5s forwards;
  margin: 30px 0 25px;
}
@keyframes expand-line {
  to { width: 320px; }
}

/* Brand text */
.brand-container {
  position: absolute;
  bottom: 22%;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  opacity: 0;
  animation: brand-in 1.2s ease-out 5.8s forwards;
  z-index: 5;
}
@keyframes brand-in {
  from { opacity: 0; transform: translateX(-50%) translateY(20px); letter-spacing: 15px; }
  to { opacity: 1; transform: translateX(-50%) translateY(0); letter-spacing: 4px; }
}

.brand-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 2.8rem;
  font-weight: 400;
  color: var(--warm-white);
  letter-spacing: 4px;
  margin-bottom: 8px;
  text-transform: uppercase;
  white-space: nowrap;
}
.brand-name .accent {
  background: linear-gradient(135deg, var(--copper-deep) 0%, var(--copper) 25%, var(--copper-shine) 50%, var(--copper) 75%, var(--copper-deep) 100%);
  background-size: 200% auto;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 500;
  animation: shimmer 4s linear infinite;
}
@keyframes shimmer { to { background-position: 200% center; } }

.brand-subtitle {
  font-family: 'Poppins', sans-serif;
  font-size: 0.75rem;
  font-weight: 300;
  color: var(--light-grey);
  letter-spacing: 8px;
  text-transform: uppercase;
  margin-top: 5px;
}

.divider-lines {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 15px;
  opacity: 0;
  animation: brand-in 0.8s ease-out 6.3s forwards;
}
.divider-lines::before, .divider-lines::after {
  content: '';
  width: 60px;
  height: 1px;
  background: var(--copper-deep);
  align-self: center;
}
.divider-lines::before { background: linear-gradient(90deg, transparent, var(--copper-deep)); }
.divider-lines::after { background: linear-gradient(90deg, var(--copper-deep), transparent); }
.divider-lines-dot {
  width: 6px; height: 6px;
  background: var(--copper);
  border-radius: 50%;
  align-self: center;
  box-shadow: 0 0 10px var(--copper-glow);
}

/* Admin tag */
.admin-tag {
  position: absolute;
  bottom: 15%;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: brand-in 1s ease-out 6.5s forwards;
}
.admin-tag span {
  font-family: 'Poppins', sans-serif;
  background: rgba(184, 115, 51, 0.08);
  border: 1px solid var(--copper-deep);
  color: var(--copper-bright);
  padding: 10px 28px;
  border-radius: 4px;
  font-size: 0.75rem;
  font-weight: 500;
  letter-spacing: 3px;
  text-transform: uppercase;
  backdrop-filter: blur(10px);
  white-space: nowrap;
}

/* Loading */
.loading-container {
  position: absolute;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  opacity: 0;
  animation: brand-in 0.8s ease-out 6.8s forwards;
}
.loading-bar {
  width: 200px;
  height: 1px;
  background: rgba(184, 115, 51, 0.2);
  overflow: hidden;
  position: relative;
}
.loading-bar::after {
  content: '';
  position: absolute;
  top: 0; left: -50%;
  width: 50%;
  height: 100%;
  background: linear-gradient(90deg, transparent, var(--copper-shine), transparent);
  animation: loading-slide 1.5s ease-in-out infinite;
}
@keyframes loading-slide { to { left: 100%; } }
.loading-text {
  text-align: center;
  font-family: 'Poppins', sans-serif;
  font-size: 0.65rem;
  color: var(--copper-deep);
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-top: 12px;
}

/* Skip */
.skip-btn {
  position: absolute;
  bottom: 25px; right: 30px;
  background: none;
  border: 1px solid rgba(184, 115, 51, 0.3);
  color: rgba(184, 115, 51, 0.6);
  padding: 8px 20px;
  border-radius: 4px;
  font-family: 'Poppins', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0;
  animation: brand-in 0.5s ease-out 7s forwards;
  z-index: 100;
}
.skip-btn:hover {
  color: var(--copper-shine);
  border-color: var(--copper);
  background: rgba(184, 115, 51, 0.1);
}

/* Corner frames */
.corner {
  position: absolute;
  width: 60px; height: 60px;
  border: 1px solid var(--copper-deep);
  opacity: 0;
  animation: brand-in 1s ease-out 6s forwards;
}
.corner-tl { top: 30px; left: 30px; border-right: none; border-bottom: none; }
.corner-tr { top: 30px; right: 30px; border-left: none; border-bottom: none; }
.corner-bl { bottom: 30px; left: 30px; border-right: none; border-top: none; }
.corner-br { bottom: 30px; right: 30px; border-left: none; border-top: none; }

@media(max-width: 768px) {
  .brand-name { font-size: 1.8rem; letter-spacing: 2px; }
  .brand-subtitle { font-size: 0.65rem; letter-spacing: 5px; }
  .dog-runner { width: 180px; height: 180px; }
  .corner { width: 40px; height: 40px; }
  .corner-tl, .corner-tr { top: 15px; left: 15px; right: 15px; }
  .corner-bl, .corner-br { bottom: 15px; left: 15px; right: 15px; }
  .woof-bubble { font-size: 1.1rem; padding: 6px 14px; }
}
</style>
</head>
<body>

<div id="splash">

  <!-- Rotating auras -->
  <div class="aura"></div>
  <div class="aura aura-2"></div>

  <!-- Corner frames -->
  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <!-- Embers -->
  <div class="ember" style="left:5%;animation-delay:0s"></div>
  <div class="ember" style="left:15%;animation-delay:2s"></div>
  <div class="ember" style="left:25%;animation-delay:4s"></div>
  <div class="ember" style="left:35%;animation-delay:1s"></div>
  <div class="ember" style="left:50%;animation-delay:3s"></div>
  <div class="ember" style="left:65%;animation-delay:5s"></div>
  <div class="ember" style="left:75%;animation-delay:2.5s"></div>
  <div class="ember" style="left:85%;animation-delay:4.5s"></div>
  <div class="ember" style="left:95%;animation-delay:1.5s"></div>

  <!-- Copper dot -->
  <div class="copper-dot"></div>

  <!-- Running dog with dust trail -->
  <div class="dog-runner" id="dogRunner">
    <div class="dog-glow"></div>

    <div class="dog-body">
      <!-- REFINED AFGHAN HOUND / BORZOI SILHOUETTE - the "supermodel" breeds -->
      <svg width="250" height="200" viewBox="0 0 250 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="copperGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffb87c"/>
            <stop offset="30%" style="stop-color:#e89658"/>
            <stop offset="60%" style="stop-color:#b87333"/>
            <stop offset="100%" style="stop-color:#8b5a2b"/>
          </linearGradient>
          <linearGradient id="copperShine" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#8b5a2b"/>
            <stop offset="50%" style="stop-color:#ffb87c"/>
            <stop offset="100%" style="stop-color:#b87333"/>
          </linearGradient>
          <linearGradient id="copperDark" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#8b5a2b"/>
            <stop offset="100%" style="stop-color:#4a2c15"/>
          </linearGradient>
          <radialGradient id="metalShine" cx="30%" cy="30%">
            <stop offset="0%" style="stop-color:#fff;stop-opacity:0.5"/>
            <stop offset="100%" style="stop-color:#fff;stop-opacity:0"/>
          </radialGradient>
        </defs>

        <!-- Back legs (further) -->
        <path d="M 180 130 Q 178 155 175 175 L 185 175 Q 188 155 190 132 Z" fill="url(#copperDark)"/>
        <path d="M 155 132 Q 152 158 148 178 L 158 178 Q 162 158 165 133 Z" fill="url(#copperDark)"/>

        <!-- Front legs (further) -->
        <path d="M 100 130 Q 98 155 95 175 L 105 175 Q 108 155 110 132 Z" fill="url(#copperDark)"/>
        <path d="M 75 130 Q 72 158 68 178 L 78 178 Q 82 158 85 132 Z" fill="url(#copperDark)"/>

        <!-- Body - long, sleek, elegant (Afghan Hound style) -->
        <path d="M 65 100
                 Q 55 88 70 78
                 L 175 75
                 Q 200 78 195 100
                 Q 200 118 190 130
                 L 70 133
                 Q 55 125 65 100 Z"
              fill="url(#copperGrad)"/>

        <!-- Body highlight strip -->
        <path d="M 75 85 Q 130 82 185 88 Q 130 90 75 92 Z" fill="url(#copperShine)" opacity="0.5"/>

        <!-- Flowing fur underneath body (Afghan-style) -->
        <path d="M 75 128 Q 100 145 130 138 Q 160 145 185 128" stroke="url(#copperDark)" stroke-width="3" fill="none" stroke-linecap="round"/>
        <path d="M 85 132 Q 90 145 88 155" stroke="url(#copperDark)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M 130 138 Q 135 152 130 160" stroke="url(#copperDark)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
        <path d="M 170 132 Q 172 148 168 155" stroke="url(#copperDark)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>

        <!-- Back legs (closer) -->
        <path d="M 175 132 Q 172 158 168 180 L 180 180 Q 184 158 187 133 Z" fill="url(#copperGrad)"/>
        <ellipse cx="174" cy="182" rx="8" ry="3" fill="url(#copperDark)"/>

        <path d="M 150 133 Q 147 160 143 182 L 155 182 Q 158 160 162 133 Z" fill="url(#copperGrad)"/>
        <ellipse cx="149" cy="184" rx="8" ry="3" fill="url(#copperDark)"/>

        <!-- Front legs (closer) - graceful stance -->
        <path d="M 95 132 Q 92 158 88 180 L 100 180 Q 103 158 107 133 Z" fill="url(#copperGrad)"/>
        <ellipse cx="94" cy="182" rx="8" ry="3" fill="url(#copperDark)"/>

        <path d="M 70 132 Q 67 160 63 182 L 75 182 Q 78 160 82 133 Z" fill="url(#copperGrad)"/>
        <ellipse cx="69" cy="184" rx="8" ry="3" fill="url(#copperDark)"/>

        <!-- Elegant plumed tail - curved up (Borzoi style) -->
        <g class="dog-tail">
          <path d="M 195 90
                   Q 220 75 228 55
                   Q 232 45 228 40
                   Q 222 38 218 45
                   Q 215 60 208 75
                   Q 200 85 192 92 Z"
                fill="url(#copperGrad)"/>
          <!-- Tail flowing feathering -->
          <path d="M 220 45 Q 225 50 228 45" stroke="url(#copperShine)" stroke-width="1" fill="none" opacity="0.8"/>
          <path d="M 215 60 Q 220 65 218 72" stroke="url(#copperShine)" stroke-width="1" fill="none" opacity="0.6"/>
          <path d="M 210 55 L 214 42" stroke="url(#copperDark)" stroke-width="1" fill="none" opacity="0.5"/>
        </g>

        <!-- Neck - long, graceful arch (Afghan) -->
        <path d="M 55 88
                 Q 40 68 45 48
                 Q 50 35 68 32
                 L 78 82 Z"
              fill="url(#copperGrad)"/>

        <!-- Head - refined, elongated (Afghan/Borzoi profile) -->
        <g class="dog-head">
          <!-- Skull -->
          <ellipse cx="55" cy="42" rx="18" ry="14" fill="url(#copperGrad)" transform="rotate(-20 55 42)"/>

          <!-- Long snout -->
          <path d="M 28 48
                   Q 15 50 12 55
                   Q 10 60 15 62
                   L 35 62
                   Q 42 58 42 52 Z"
                fill="url(#copperGrad)"/>

          <!-- Head highlight -->
          <ellipse cx="52" cy="36" rx="10" ry="5" fill="url(#copperShine)" opacity="0.5" transform="rotate(-20 52 36)"/>

          <!-- Long flowing ears (Afghan Hound signature) -->
          <path d="M 62 32
                   Q 55 20 60 12
                   Q 68 8 72 20
                   Q 74 35 68 50
                   Q 62 45 58 38 Z"
                fill="url(#copperDark)"/>
          <path d="M 63 25 Q 65 20 68 22" stroke="url(#copperGrad)" stroke-width="0.8" fill="none" opacity="0.7"/>
          <!-- Ear feathering -->
          <path d="M 66 48 Q 68 55 65 62" stroke="url(#copperDark)" stroke-width="1.5" fill="none" opacity="0.7"/>

          <!-- Second ear (further) -->
          <path d="M 55 28
                   Q 48 18 52 10
                   Q 60 7 62 18
                   Q 63 30 58 42 Z"
                fill="url(#copperDark)" opacity="0.7"/>

          <!-- Almond eye - refined, alert -->
          <ellipse cx="45" cy="45" rx="3" ry="2" fill="#1a1a1a" transform="rotate(-15 45 45)"/>
          <circle cx="44" cy="44" r="0.5" fill="#fff" opacity="0.8"/>

          <!-- Nose - refined -->
          <ellipse cx="14" cy="57" rx="3" ry="2.5" fill="#1a1a1a"/>
          <circle cx="13" cy="56" r="0.6" fill="#fff" opacity="0.5"/>

          <!-- Subtle mouth -->
          <path d="M 16 62 Q 25 64 34 62" stroke="#4a2c15" stroke-width="0.8" fill="none" stroke-linecap="round"/>

          <!-- Under-jaw line -->
          <path d="M 16 62 Q 22 66 32 65" stroke="url(#copperDark)" stroke-width="0.5" fill="none" opacity="0.7"/>
        </g>

        <!-- Elegant collar -->
        <ellipse cx="65" cy="80" rx="18" ry="4" fill="none" stroke="url(#copperDark)" stroke-width="2"/>
        <ellipse cx="65" cy="80" rx="18" ry="4" fill="none" stroke="url(#copperShine)" stroke-width="0.5" opacity="0.6"/>
        <!-- Collar tag -->
        <circle cx="65" cy="86" r="5" fill="url(#copperGrad)" stroke="#4a2c15" stroke-width="0.5"/>
        <circle cx="63.5" cy="84" r="1.5" fill="url(#copperShine)" opacity="0.9"/>
        <text x="65" y="88.5" font-size="4" fill="#4a2c15" font-weight="bold" text-anchor="middle" font-family="serif">R</text>

        <!-- Body shine spots for metallic effect -->
        <ellipse cx="110" cy="95" rx="25" ry="8" fill="url(#metalShine)"/>
        <ellipse cx="165" cy="92" rx="18" ry="6" fill="url(#metalShine)"/>
      </svg>
    </div>

    <!-- Woof bubbles -->
    <div class="woof-bubble woof-1">Woof!</div>
    <div class="woof-bubble woof-2">Woof!</div>
  </div>

  <!-- Brand -->
  <div class="brand-container">
    <h1 class="brand-name"><span class="accent">Refuge</span> de la <span class="accent">Tendresse</span></h1>
    <div class="brand-subtitle">Espace Administrateur</div>
    <div class="divider-lines"><div class="divider-lines-dot"></div></div>
  </div>

  <!-- Admin tag -->
  <div class="admin-tag">
    <span>Bienvenue &middot; Session Securisee</span>
  </div>

  <!-- Loading -->
  <div class="loading-container">
    <div class="loading-bar"></div>
    <div class="loading-text">Chargement</div>
  </div>

  <!-- Skip -->
  <button class="skip-btn" onclick="endSplash()">Passer</button>
</div>

<script>
// Trigger "arrived" state when dog stops running (at 3.5s)
setTimeout(function() {
  var runner = document.getElementById('dogRunner');
  if (runner) runner.classList.add('arrived');
}, 3500);

// Trigger woof animations
setTimeout(function() {
  var runner = document.getElementById('dogRunner');
  if (runner) runner.classList.add('woofing-1');
}, 3600);

setTimeout(function() {
  var runner = document.getElementById('dogRunner');
  if (runner) {
    runner.classList.remove('woofing-1');
    runner.classList.add('woofing-2');
  }
}, 4600);

function endSplash() {
  document.getElementById('splash').classList.add('hide');
  setTimeout(function() {
    if (window.parent && window.parent.splashComplete) {
      window.parent.splashComplete();
    } else {
      window.parent.postMessage('splashDone', '*');
    }
  }, 800);
}

// Auto-end after 8 seconds
setTimeout(function() { endSplash(); }, 8000);
</script>

</body>
</html>
